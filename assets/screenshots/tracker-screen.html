<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1284px;
      height: 2778px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Top text section ── */
    .top {
      width: 100%;
      padding: 140px 100px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
    }

    .tag {
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #e8380d;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: 110px;
      font-weight: 900;
      color: #0e0e0e;
      line-height: 1.08;
      letter-spacing: -2px;
    }

    .headline span {
      color: #e8380d;
      font-style: italic;
    }

    .sub {
      font-family: 'Inter', sans-serif;
      font-size: 30px;
      font-weight: 400;
      color: rgba(0,0,0,0.38);
      line-height: 1.6;
      max-width: 800px;
    }

    /* ── Phone image ── */
    .phone-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10px;
    }

    .phone-wrap img {
      height: 1900px;
      width: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="tag">Workout Tracker</div>
    <div class="headline">
      See your<br/><span>strength</span><br/>grow.
    </div>
    <div class="sub">Every rep logged. Every PR celebrated.<br/>Your progress, beautifully visualised.</div>
  </div>

  <div class="phone-wrap">
    <!-- Replace src with the actual path to your screenshot -->
    <img src="../images/tracker-shot.png" alt="Tracker screen" />
  </div>

</body>
</html>
