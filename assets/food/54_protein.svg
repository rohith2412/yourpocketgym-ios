<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- shaker bottle body -->
  <rect x="20" y="20" width="24" height="34" rx="8" fill="#e8f4ff" stroke="#90bde0" stroke-width="2"/>
  <!-- shaker lid -->
  <rect x="22" y="12" width="20" height="10" rx="5" fill="#4a90d9" stroke="#2d6fbf" stroke-width="1.5"/>
  <!-- spout -->
  <rect x="27" y="8" width="10" height="6" rx="3" fill="#2d6fbf"/>
  <!-- liquid level -->
  <rect x="22" y="38" width="20" height="14" rx="0 0 6 6" fill="#a8d4f5" opacity="0.7"/>
  <rect x="22" y="36" width="20" height="4" rx="2" fill="#7bbde8" opacity="0.5"/>
  <!-- label band -->
  <rect x="20" y="28" width="24" height="12" rx="2" fill="#4a90d9" opacity="0.15"/>
  <text x="32" y="37" text-anchor="middle" font-size="7" font-weight="bold" fill="#2d6fbf" font-family="Arial">PRO</text>
  <!-- bubbles -->
  <circle cx="26" cy="44" r="2" fill="white" opacity="0.6"/>
  <circle cx="32" cy="46" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="38" cy="43" r="1.8" fill="white" opacity="0.55"/>
</svg>
